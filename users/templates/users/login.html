

{% extends "base.html" %}
{% load tailwind_filters %}

{% block content %}
<h1 class='text-2xl font-bold text-center mb-10 sm:text-3xl'>Iniciar seccion</h1>
<form action="" method="post">

    {% csrf_token %}
    {{form | crispy}}

    <button
    class="inline-block rounded-sm border border-yellow-600 bg-yellow-400 px-12 py-3 text-sm font-medium text-white hover:bg-transparent hover:text-indigo-600"
    type="submit">Login</button>

</form>

<div>
    <!-- Al final de tu formulario de login -->
<p class="text-center text-sm text-gray-500 mt-8">
    ¿No tienes cuenta? 
    <a href="{% url 'register' %}" class="text-yellow-600 hover:text-yellow-500 font-medium">
        Regístrate aquí
    </a>
</p>
</div>
{% endblock  %}
